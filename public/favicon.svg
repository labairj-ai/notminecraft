<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Grass block side view — 16×16 pixel art -->

  <!-- Row 0: solid grass green -->
  <rect x="0" y="0" width="16" height="1" fill="#5d9c33"/>

  <!-- Row 1: grass with lighter spots -->
  <rect x="0" y="1" width="16" height="1" fill="#5d9c33"/>
  <rect x="2" y="1" width="1" height="1" fill="#72b840"/>
  <rect x="6" y="1" width="1" height="1" fill="#4f8a2d"/>
  <rect x="11" y="1" width="1" height="1" fill="#72b840"/>
  <rect x="14" y="1" width="1" height="1" fill="#4f8a2d"/>

  <!-- Row 2: grass texture -->
  <rect x="0" y="2" width="16" height="1" fill="#5d9c33"/>
  <rect x="4" y="2" width="1" height="1" fill="#72b840"/>
  <rect x="9" y="2" width="1" height="1" fill="#4f8a2d"/>
  <rect x="13" y="2" width="1" height="1" fill="#72b840"/>
  <rect x="1" y="2" width="1" height="1" fill="#4f8a2d"/>

  <!-- Row 3: grass fading to dirt -->
  <rect x="0" y="3" width="16" height="1" fill="#5d9c33"/>
  <rect x="1" y="3" width="1" height="1" fill="#72b840"/>
  <rect x="7" y="3" width="1" height="1" fill="#4f8a2d"/>
  <rect x="15" y="3" width="1" height="1" fill="#72b840"/>

  <!-- Row 4: top of dirt (with a hint of green at the very edge) -->
  <rect x="0" y="4" width="16" height="1" fill="#8B5E3C"/>
  <rect x="0" y="4" width="16" height="1" fill="#8B5E3C"/>
  <rect x="3" y="4" width="1" height="1" fill="#7a5230"/>
  <rect x="8" y="4" width="1" height="1" fill="#9e6b42"/>
  <rect x="13" y="4" width="1" height="1" fill="#7a5230"/>

  <!-- Rows 5–15: dirt body -->
  <rect x="0" y="5" width="16" height="11" fill="#8B5E3C"/>

  <!-- Dirt texture — darker patches -->
  <rect x="1" y="5" width="2" height="1" fill="#7a5230"/>
  <rect x="10" y="5" width="2" height="1" fill="#7a5230"/>
  <rect x="5" y="6" width="1" height="2" fill="#9e6b42"/>
  <rect x="12" y="6" width="2" height="1" fill="#9e6b42"/>
  <rect x="2" y="7" width="1" height="1" fill="#9e6b42"/>
  <rect x="8" y="7" width="2" height="1" fill="#7a5230"/>
  <rect x="14" y="7" width="2" height="1" fill="#7a5230"/>
  <rect x="0" y="8" width="2" height="1" fill="#7a5230"/>
  <rect x="6" y="8" width="1" height="2" fill="#9e6b42"/>
  <rect x="11" y="8" width="2" height="1" fill="#7a5230"/>
  <rect x="3" y="9" width="2" height="1" fill="#9e6b42"/>
  <rect x="13" y="9" width="1" height="2" fill="#9e6b42"/>
  <rect x="1" y="10" width="1" height="1" fill="#7a5230"/>
  <rect x="9" y="10" width="2" height="1" fill="#7a5230"/>
  <rect x="4" y="11" width="2" height="1" fill="#7a5230"/>
  <rect x="14" y="11" width="2" height="1" fill="#9e6b42"/>
  <rect x="7" y="12" width="2" height="1" fill="#9e6b42"/>
  <rect x="0" y="12" width="2" height="1" fill="#9e6b42"/>
  <rect x="11" y="12" width="2" height="1" fill="#7a5230"/>
  <rect x="3" y="13" width="1" height="2" fill="#9e6b42"/>
  <rect x="8" y="13" width="2" height="1" fill="#7a5230"/>
  <rect x="15" y="13" width="1" height="2" fill="#7a5230"/>
  <rect x="5" y="14" width="2" height="1" fill="#9e6b42"/>
  <rect x="12" y="14" width="2" height="1" fill="#7a5230"/>
  <rect x="1" y="15" width="2" height="1" fill="#7a5230"/>
  <rect x="9" y="15" width="2" height="1" fill="#9e6b42"/>
</svg>
